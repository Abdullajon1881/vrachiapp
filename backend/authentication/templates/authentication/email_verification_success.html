<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email подтвержден - VrachiApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #095880 0%, #1e88e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        
        .logo {
            color: #095880;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: #4caf50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
            font-size: 40px;
        }
        
        .title {
            color: #095880;
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .message {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .btn {
            background: #095880;
            color: #ffffff;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #1e88e5;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        .error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .loading {
            color: #666;
            font-size: 16px;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 40px 20px;
            }
            
            .title {
                font-size: 24px;
            }
            
            .logo {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">VrachiApp</div>
        
        {% if success %}
            <div class="success-icon">✓</div>
            <h1 class="title">Email подтвержден!</h1>
            <p class="message">
                Ваш email успешно подтвержден. Теперь вы можете войти в свой аккаунт и пользоваться всеми возможностями VrachiApp.
            </p>
            <a href="https://healzy.uz" class="btn">Перейти на главную</a>
        {% else %}
            <div class="error">
                <h2>Ошибка подтверждения</h2>
                <p>{{ error_message }}</p>
            </div>
            <a href="https://healzy.uz" class="btn">Перейти на главную</a>
        {% endif %}
    </div>
    
    <script>
        // Автоматическое перенаправление через 5 секунд
        setTimeout(() => {
            window.location.href = 'https://healzy.uz';
        }, 5000);
    </script>
</body>
</html>
